name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  bats:
    # macOS runner は bats 1.13 が日本語テスト名をバイト列解釈し「unknown test name」で失敗するため ubuntu のみ。
    # Action 自体の macOS 対応は integration job で検証する
    name: Bats unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Run bats
        run: bats tests/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          SHELLCHECK_OPTS: -x
        with:
          scandir: './scripts'
          additional_files: 'tests/fixtures/bm-mock'
      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          min-severity: high
          advanced-security: false
          annotations: true

  integration:
    name: Integration mock (${{ matrix.os }})
    needs: [bats, lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write
      packages: read
    env:
      MOCK_OIDC_PORT: '34567'
      ACTIONS_ID_TOKEN_REQUEST_URL: 'http://127.0.0.1:34567/token?'
      ACTIONS_ID_TOKEN_REQUEST_TOKEN: 'mock-request-token'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # 本 Action は Node セットアップ・依存インストールを呼び出し側責任とするため、
      # 実利用と同じパターンを integration job でも踏襲する
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Prepare test project
        shell: bash
        run: |
          mkdir -p test-project
          cp tests/fixtures/basemachina.config.ts test-project/
          cp tests/fixtures/package.json test-project/

      - name: Register mock CLI command
        shell: bash
        run: |
          echo "BM_CLI_COMMAND=${GITHUB_WORKSPACE}/tests/fixtures/bm-mock" >> "$GITHUB_ENV"

      # auth.sh が要求する OIDC エンドポイントをローカル mock へ差し替える。
      # fork PR には id-token: write が付与されず本物の OIDC が使えないため、トークン値を参照しない
      # 統合テストでは mock で代替する。
      - name: Start mock OIDC endpoint
        shell: bash
        run: |
          node "${GITHUB_WORKSPACE}/tests/fixtures/mock-oidc-server.js" &
          echo "$!" > "${RUNNER_TEMP}/mock-oidc.pid"
          # 接続確立まで retry
          curl -sS -o /dev/null --retry 10 --retry-connrefused --retry-delay 1 \
            "http://127.0.0.1:${MOCK_OIDC_PORT}/token?audience=ping" \
            || { echo "::error::mock OIDC endpoint not reachable on port ${MOCK_OIDC_PORT}"; exit 1; }
          echo "mock OIDC endpoint ready on port ${MOCK_OIDC_PORT}"

      - name: Run action (dev sync, dry-run)
        id: dev-dry
        uses: ./
        with:
          audience: https://example.test
          working-directory: test-project
          dry: 'true'

      - name: Verify dev-dry outputs
        shell: bash
        env:
          DEV_DRY_EXIT_CODE: ${{ steps.dev-dry.outputs.exit_code }}
        run: |
          test "${DEV_DRY_EXIT_CODE}" = "0"

      - name: Run action (env sync, dry-run)
        id: env-dry
        uses: ./
        with:
          audience: https://example.test
          working-directory: test-project
          environment-id: env-integration-test
          dry: 'true'

      - name: Verify env-dry outputs
        shell: bash
        env:
          ENV_DRY_EXIT_CODE: ${{ steps.env-dry.outputs.exit_code }}
        run: |
          test "${ENV_DRY_EXIT_CODE}" = "0"

      - name: Run action (failure propagation)
        id: fail
        continue-on-error: true
        env:
          BM_MOCK_EXIT_CODE: '1'
        uses: ./
        with:
          audience: https://example.test
          working-directory: test-project
          dry: 'true'

      - name: Verify failure propagation
        shell: bash
        env:
          FAIL_OUTCOME: ${{ steps.fail.outcome }}
          FAIL_EXIT_CODE: ${{ steps.fail.outputs.exit_code }}
        run: |
          if [ "${FAIL_OUTCOME}" != "failure" ]; then
            echo "::error::action step should have failed but got outcome=${FAIL_OUTCOME}"
            exit 1
          fi
          test "${FAIL_EXIT_CODE}" = "1"

      - name: Stop mock OIDC endpoint
        if: always()
        shell: bash
        run: |
          pid_file="${RUNNER_TEMP}/mock-oidc.pid"
          if [ -f "${pid_file}" ]; then
            kill "$(cat "${pid_file}")" 2>/dev/null || true
          fi

  cli-install:
    name: Install @basemachina/cli (${{ matrix.os }})
    needs: [bats, lint]
    # 呼び出し側の install パス (registry-url + scope + GITHUB_TOKEN) と、
    # `npx --no-install @basemachina/cli` が node_modules を解決できることを検証する。
    # 実 sync は BaseMachina backend 認証が必要なため CI からは検証しない (mock 側で担保)。
    # fork PR では secrets / packages:read が無効化されるため skip
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@basemachina'

      - name: Install CLI from registry
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p test-project
          cp tests/fixtures/package.installed.json test-project/package.json
          (cd test-project && npm install)

      # CLI 起動の検証 (--version 等) は CLI 仕様に依存するため行わない。
      # node_modules への配置と、`npx --no-install` がパッケージを解決できることまで担保する
      - name: Verify CLI is resolvable via node_modules
        shell: bash
        working-directory: test-project
        run: |
          test -d node_modules/@basemachina/cli
          npm exec --no-install --prefix . -- node -e "require.resolve('@basemachina/cli/package.json')"
